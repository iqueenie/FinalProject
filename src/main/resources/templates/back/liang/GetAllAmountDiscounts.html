<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>折扣列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.css" />
</head>

<body>
    <div th:replace="~{back/layout/navbar}"></div>

    <div class="container mt-3">
       <!-- 在折扣列表页面中 -->
<div class="d-flex justify-content-center align-items-center">
    <a href="#" th:href="@{/AmountInserts}" class="btn btn-outline-success">新增</a>
    <h1 class="m-auto">節日優惠</h1>
</div>

        <table id="myTable" class="w-100 display">
            <thead>
                <tr>
                    <td>折扣ID</td>
                    <td>折扣名稱</td>
                    <td>最低購買金額</td>
                    <td>折扣百分比</td>
                    <td>開始日期</td>
                    <td>結束日期</td>
                    <td>狀態</td>
                    <td>更新</td>
                    <td>刪除</td>
                </tr>
            </thead>
            <tbody>
                <th:block th:each="discount : ${amount}">
                    <tr class="data">
                        <td>[[${discount.discountId}]]</td>
                        <td>[[${discount.discountName}]]</td>
                        <td>[[${discount.minPurchaseAmount}]]</td>
                        <td>[[${discount.discountPercentage}]]%</td>
                        <td>[[${discount.startDate}]]</td>
                        <td>[[${discount.endDate}]]</td>
                        <td th:text="${discount.isActive == 1 ? '上架' : '下架'}"></td>
                        <td><a href="#" class="btn btn-outline-warning btn-sm">更新</a></td>
                        <td><a href="#" class="btn btn-outline-danger btn-sm" th:attr="onclick='confirmDelete(\'' + ${discount.discountId} + '\')'">刪除</a></td>
                    </tr>
                </th:block>
            </tbody>
        </table>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        $(document).ready(function() {
            $('#myTable').DataTable();
        });

     function confirmDelete(id) {
    console.log(id); // 确认是否输出了正确的 discountId
    Swal.fire({
        title: "確定要刪除嗎？",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "red",
        cancelButtonColor: "gray",
        confirmButtonText: "刪除",
        cancelButtonText: "取消",
        reverseButtons: true
    }).then((result) => {
        if (result.isConfirmed) {
            // 发送删除请求到后端
            $.ajax({
                type: "POST",
                url: "/AmountDelete",
                data: { id: id },
                success: function(response) {
                    Swal.fire({
                        title: "刪除成功！",
                        icon: "success"
                    }).then(() => {
                        window.location.reload(); // 删除成功后刷新页面或者更新表格数据
                    });
                },
                error: function(xhr, status, error) {
                    Swal.fire({
                        title: "刪除失敗！",
                        icon: "error"
                    });
                }
            });
        }
    });
}


    </script>
</body>

</html>
