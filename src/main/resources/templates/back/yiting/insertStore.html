<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>店鋪新增</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
	<div th:replace="~{back/layout/navbar}"></div>
    <div class="container d-flex justify-content-center">
        <form th:action="@{/store/insertStore}" th:object="${store}" method="post" class="mt-5 bg-secondary-subtle mw576px rounded-4">
            <div class="row g-2 m-2">
                <h2 class="col-12 text-center">店鋪新增</h2>


                <div class="col-12">
                    <div class="form-floating">
                        <textarea class="form-control"  id="storeName" th:field="*{storeName}" placeholder="storeName"></textarea>
                        <label for="storeName">店鋪名稱</label>
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-group">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <!-- 左侧的 twzipcode_ADV -->
                                <div id="twzipcode_ADV" class="twzipcode"></div>
                            </div>
                            <div class="col-md-9">
                                <!-- 右侧的 form-floating -->
                                <div class="form-floating mt-2">
                                    <textarea class="form-control rounded" id="street" th:field="*{street}" placeholder="street" style="width: 100%;"></textarea>
                                    <label for="street">詳細地址</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


                <div class="col-12">
                    <div class="form-floating">
                        <textarea class="form-control" th:field="*{tel}" id="tel" placeholder="tel"></textarea>
                        <label for="tel">電話</label>
                    </div>
                </div>

                <div class="mt-3 col-12 d-flex justify-content-center mb-3">
                    <button class="btn btn-secondary me-2">返回</button>
                    <button type="submit" class="btn btn-success">更新/新增</button>
                </div>
            </div>
        </form>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-twzipcode@1.7.14/jquery.twzipcode.min.js"></script>
    <script>
        $('form').submit(function (event) {
            event.preventDefault();

            Swal.fire({
                title: "確定要更新/新增嗎？",
                icon: "question",
                showCancelButton: true,
                confirmButtonColor: "green",
                cancelButtonColor: "gray",
                confirmButtonText: "更新/新增",
                cancelButtonText: "取消",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    this.submit();
                }
            });
        });

       $(document).ready(function () {
            $("#twzipcode_ADV").twzipcode({
                zipcodeIntoDistrict: true,
                css: ["city form-control", "town form-control"],
                countyName: "city", // 對應到 JavaBean 的 city
                districtName: "area", // 對應到 JavaBean 的 area
                zipcodeName: "cityNum" // 對應到 JavaBean 的 areaNum
            });
        });
    </script>
</body>

</html>
