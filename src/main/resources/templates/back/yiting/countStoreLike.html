<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>店鋪收藏彙總</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.css" />
</head>

<body>
    <div th:replace="~{back/layout/navbar}"></div>
    <div class="container mt-3">
        <div class="d-flex justify-content-center align-items-center">
            <h1 class="m-auto">店鋪收藏彙總</h1>
        </div>
        <table id="myTable" class="w-100 display" style="display:none">
            <thead>
                <tr>
                    <td>店鋪編號</td>
                    <td>店鋪名稱</td>
                    <td>收藏數</td>
                </tr>
            </thead>
            <tbody>
                <tr th:each="store, index : ${storeCount}">
                    <td th:text="${store.storeId}"></td>
                    <td th:text="${store.storeName}"></td>
                    <td th:text="${likeCount[__${index.index}__]}"></td>
                </tr>
            </tbody>
        </table>
        <div class="mt-5">
            <canvas id="myChart" width="400" height="200"></canvas> <!-- 添加 canvas 元素 -->
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- 引入 Chart.js -->
    <script>
        //$('#myTable').DataTable({});

        // 从表格中提取数据
        const labels = [];
        const data = [];

        $('#myTable tbody tr').each(function() {
            const storeName= $(this).find('td').eq(1).text();
            const likeCount = parseInt($(this).find('td').eq(2).text());
            labels.push(storeName);
            data.push(likeCount);
        });

        // 绘制 Chart.js 图表
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '收藏數',
                    data: data,
                    backgroundColor: 'rgba(250,213,106,0.3)',
                    borderColor: 'rgba(107,178,82,1)',
                    borderWidth: 1, // 边框宽度
                    barThickness: 'flex', // 条形宽度, 使用 'flex' 来自动调整条形宽度
                    categoryPercentage: 0.3, // 调整类别宽度比例
                    barPercentage: 0.8 // 调整条形在类别宽度中的比例
                   
                }]
            },
            options: {
                scales: {
                    x: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: '店鋪名稱'
                        }
                    },
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: '收藏數'
                        },
                        ticks: {
                            stepSize: 1, // 确保 Y 轴刻度为整数
                            callback: function(value) {
                                return Number.isInteger(value) ? value : ''; // 仅显示整数
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>

</html>
