<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <h2>Shopping Cart</h2>
    <ul>
        <li th:each="item : ${cartItems}" th:text="${item}"></li>
    </ul>
    <form th:action="@{/yiting/cart/add}" th:method="post">
        <input type="text" name="item" placeholder="Enter item">
        <button type="submit">Add to Cart</button>
    </form>
    <form th:action="@{/yiting/cart/clear}" th:method="post">
        <button type="submit">Clear Cart</button>
    </form>
</body>
</html>
