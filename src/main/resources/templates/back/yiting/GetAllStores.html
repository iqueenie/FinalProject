<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>店鋪列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.css" />
</head>

<body>
    <div th:replace="~{back/layout/navbar}"></div>
    <div class="container mt-3">
        <div class="d-flex justify-content-center align-items-center">
            <a th:href="@{/store/addStorePage}" class="btn btn-outline-success">新增</a>
            <h1 class="m-auto">店鋪列表</h1>
        </div>
        <table id="myTable" class="w-100 display">
            <thead>
                <tr>
                    <td>店鋪編號</td>
                    <td>店鋪名稱</td>
                    <td>郵遞區號</td>
                    <td>城市</td>
                    <td>區域</td>
                    <td>街道</td>
                    <td>電話</td>
                    <td>更新</td>
                    <td>刪除</td>
                </tr>
            </thead>
            <tbody>
                <th:block th:each=" store : ${listStores}">
                    <tr th:id="'storeRow_' + ${store.storeId}">
                        <td th:text="${store.storeId}"></td>
                        <td th:text="${store.storeName}"></td>
                        <td th:text="${store.cityNum}"></td>
                        <td th:text="${store.city}"></td>
                        <td th:text="${store.area}"></td>
                        <td th:text="${store.street}"></td>
                        <td th:text="${store.tel}"></td>
                        <td><button href="#" class="btn btn-outline-warning btn-sm">更新</button></td>
                        <td>
                            <button id="myBtn" th:onclick="'confirmDelete(\'' + ${store.storeId} + '\')'"
                                class="btn btn-outline-danger btn-sm">刪除</button>

                        </td>
                    </tr>
                </th:block>
            </tbody>
        </table>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        $('#myTable').DataTable({});



        function confirmDelete(id) {
            console.log("id: " + id);
            Swal.fire({
                title: "確定要刪除嗎？",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "red",
                cancelButtonColor: "gray",
                confirmButtonText: "刪除",
                cancelButtonText: "取消",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    axios.delete(`http://localhost:8080/FinalProject/store/delete?id= ${id}`)
                        .then(res => {
                            console.log(res)
                            if (res.data === "success") {

                                axios.get("http://localhost:8080/FinalProject/stores/findAllAjax")
                                    .then(response => {
                                        console.log(response.data);
                                        let data = response.data;
                                        $("#myTable").DataTable().clear().draw();
                                        data.forEach(store => {
                                            $("#myTable").DataTable().row.add([
                                                store.storeId,
                                                store.storeName,
                                                store.cityNum,
                                                store.city,
                                                store.area,
                                                store.street,
                                                store.tel,
                                                `<button href="#" class="btn btn-outline-warning btn-sm">更新</button>`,
                                                `<button onclick="confirmDelete(${store.storeId})" class="btn btn-outline-danger btn-sm">刪除</button>`
                                            ]).draw();
                                        });
                                        Swal.fire({
                                            title: "刪除成功！",
                                            icon: "success"
                                        })

                                    })
                                    .catch(err => {
                                        console.error(err);
                                    })
                            }
                        })
                        .catch(err => {
                            console.error(err);
                        })
                }
            })
        }

    </script>
</body>

</html>
