<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品資料</title>
    <!-- Bootstrap 5.3.0 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <script>
		$(document).ready(function() {
		    // 初始化 DataTable
		    var table = $('#productTable').DataTable({
		        "paging": true,
		        "ordering": true,
		        "info": true,
		        "language": {
		            "info": "顯示 _START_ 至 _END_ 筆，共 _TOTAL_ 筆資料",
		            "lengthMenu": "顯示 <select>"+
		                '<option value="10">10</option>'+
		                '<option value="20">20</option>'+
		                '<option value="50">50</option>'+
		                '<option value="100">100</option>'+
		                '<option value="-1">所有</option>'+
		              '</select> 筆資料',
		            "paginate": {
		                "first": "第一頁",
		                "last": "最後一頁",
		                "next": "下一頁",
		                "previous": "上一頁"
		              },
		              "search": "搜尋:"
		        }
		    });
		
		    // 刪除
		    $('#productTable').on('click', '.delete-btn', function(e) {
		        e.preventDefault();
		        var productId = $(this).data('product-id');
		        console.log("productId:" + productId);
		        Swal.fire({
		            title: '確定刪除嗎？',
		            icon: 'question',
		            showCancelButton: true,
		            confirmButtonText: '確定',
		            cancelButtonText: '取消',
		            buttonsStyling: false,
		            customClass: {
		                confirmButton: 'btn btn-outline-danger btn-sm me-2',
		                cancelButton: 'btn btn-outline-secondary btn-sm'
		            },
		        }).then((result) => {
		            if (result.isConfirmed) {
		                deleteProduct(productId);
		            }
		        });
		    });
		
		    // 詳情
		    $('#productTable').on('click', '.detail-btn', function(e) {

		    });
		
		    // 删除产品的函数
		    function deleteProduct(id) {
		        axios.delete(`http://localhost:8080/FinalProject/Product/delete?productId=${id}`)
		            .then(res => {
		                console.log(res);
		                if (res.data === "success") {
		                    reloadTableData(); // 删除成功后重新加载数据
		                    Swal.fire({
		                        title: "刪除成功！",
		                        icon: "success"
		                    });
		                }
		            })
		            .catch(err => {
		                console.error(err);
		            });
		    }
		
		    // 加载或重新加载表格数据
		    function reloadTableData() {
		        var currentPage = table.page(); // 當前頁碼
		        var pageLength = table.page.len(); // 每頁顯示的條數
		
		        axios.get("http://localhost:8080/FinalProject/Product/findAllAjax")
		            .then(response => {
		                console.log(response.data);
		                var data = response.data;
		                table.clear(); // 清空表格
		                data.forEach(product => {
		                    var publishedStatus = product.productPublished == 1 ? '是' : '否';
		                    table.row.add([
		                        product.productId,
		                        product.productName,
		                        product.productType,
		                        product.productCost,
		                        product.productPrice,
		                        product.productExpirydate,
		                        product.productQuantity,
		                        publishedStatus,
		                        `<a href="/FinalProject/Product/UpdatePage?productId=${product.productId}" class="btn btn-outline-warning btn-sm detail-btn">詳情</a>`,
		                        `<a href="#" class="btn btn-outline-danger btn-sm delete-btn" data-product-id="${product.productId}">刪除</a>`
		                    ]);
		                });
		
		                table.draw(false); // 重新繪製表格
		
		                // 恢復之前的頁碼
		                if (currentPage > 0 && data.length % pageLength === 0 && (data.length / pageLength) - 1 !== currentPage) {
		                    table.page(currentPage - 1).draw(false); // 上一頁
		                } else {
		                    table.page(currentPage).draw(false); // 當前頁碼
		                }
		
						// 重新綁定詳情按鈕的點擊事件
		                $('#productTable').off('click', '.detail-btn').on('click', '.detail-btn', function(e) {
		                
		                });
		            })
		            .catch(err => {
		                console.error(err);
		            });
		    }
		
		    // 初次加載Table
		    reloadTableData();
		});
    </script>
</head>
<body>
    <div th:replace="~{back/layout/navbar}"></div>
    <header id="header-container"></header>
    <aside id="aside-container"></aside>
    <main class="content">
        <div class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a th:href="@{/Product/AddProductPage}" class="btn btn-outline-success">新增</a>
            </div>
            <h2 class="mb-4">商品資料</h2>
            <table id="productTable" class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>商品編號</th>
                        <th>商品</th>
                        <th>種類</th>
                        <th>成本</th>
                        <th>售價</th>
                        <th>效期</th>
                        <th>數量</th>
                        <th>上架</th>
                        <th>詳情</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
  
                </tbody>
            </table>
        </div>
    </main>
    <!-- Bootstrap 5.3.0 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
