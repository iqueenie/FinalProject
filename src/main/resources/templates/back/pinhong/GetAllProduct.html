<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品資料</title>
    <!-- Bootstrap 5.3.0 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="pinhong/css/style.css">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#productTable').DataTable({
                "paging": true,
                "ordering": true,
                "info": true,
                "language": {
                    "info": "顯示 _START_ 至 _END_ 筆，共 _TOTAL_ 筆資料",
                    "lengthMenu": 
                    	"顯示 <select>"+
                        '<option value="10">10</option>'+
                        '<option value="20">20</option>'+
                        '<option value="50">50</option>'+
                        '<option value="100">100</option>'+
                        '<option value="-1">所有</option>'+
                      '</select> 筆資料',
                    "paginate": {
                        "first": "第一頁",
                        "last": "最後一頁",
                        "next": "下一頁",
                        "previous": "上一頁"
                      },
                      "search": "搜尋:"
                }
            });
        });
    </script>
</head>
<body>
	    <div th:replace="~{back/layout/navbar}"></div>
    <header id="header-container"></header>
    <aside id="aside-container"></aside>
    <main class="content">
        <div class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a th:href="@{/Productinsertmain}" class="btn btn-outline-success">新增</a>
                <!--<form class="keyword d-flex align-items-center" method="post" action="GetSomeProudcts">
                    
                    <label for="keyword" class="me-2">商品名稱：</label> 
                    <input type="text" id="keyword" name="productName" class="form-control me-2">
                    <button class="btn btn-primary" type="submit">搜索</button> 
                    
                </form>-->
            </div>
            <h2 class="mb-4">商品資料</h2>
            <table id="productTable" class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>商品編號</th>
                        <th>商品</th>
                        <th>種類</th>
                        <th>成本</th>
                        <th>售價</th>
                        <th>效期</th>
                        <th>上架</th>
                        <th>詳情</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
					<th:block th:each="product : ${products}">
                        <tr>
                            <td>[[${product.productId}]]</td>
                            <td>[[${product.productName}]]</td>
                            <td>[[${product.productType}]]</td>
                            <td>[[${product.productCost}]]</td>
                            <td>[[${product.productPrice}]]</td>
                            <td>[[${product.productExpirydate}]]</td>
                            <td>[[${product.productPublished == 1 ? '是' : '否'}]]</td>
                            <td>
                                <a th:href="@{/ProductUpdate(productId=${product.productId})}" class="btn btn-outline-warning btn-sm">詳情</a>
                            </td>
                            <td>
                                <a th:href="@{/Productdelete(productId=${product.productId})}"class="btn btn-outline-danger btn-sm delete-btn">刪除</a>                        
                            </td>
                        </tr>
                    </th:block>
                </tbody>
            </table>
           <!-- <h3 class="total">${products.size()}筆商品資料</h3> -->
        </div>
    </main>
    <script>
    	$('.delete-btn').click(function(e) {
                e.preventDefault();
                var deleteUrl = $(this).attr('href');
                Swal.fire({
                    title: '確定刪除嗎？',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: '確定',
                    cancelButtonText: '取消',
                    buttonsStyling: false, // 禁用默认样式
	        customClass: {
	            confirmButton: 'btn btn-outline-danger btn-sm me-2', 
	            cancelButton: 'btn btn-outline-secondary btn-sm'
	        },
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = deleteUrl;
                    }
                });
            });
    </script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
            crossorigin="anonymous"></script>
	<script src="https://kit.fontawesome.com/2fdc1b1d20.js" crossorigin="anonymous"></script>
    <!-- Bootstrap 5.3.0 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
