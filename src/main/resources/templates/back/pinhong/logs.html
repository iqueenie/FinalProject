<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.css" />
    <title>會員操作日誌</title>
</head>
<body>
    <div th:replace="~{back/layout/navbar}"></div>
    <header id="header-container"></header>
    <aside id="aside-container"></aside>
    <main class="content">
        <div class="container mt-3">
            <div class="d-flex justify-content-center align-items-center">
                <a th:href="@{/private/Product/AddProductPage}" class="btn btn-outline-success">新增</a>
           		<h1 class="m-auto">商品資料</h1>
            </div>
            <table id="myTable" class="w-100 display">
                <thead>
            <tr>
                <th>會員ID</th>
                <th>會員帳號</th>
                <th>商品ID</th>
                <th>商品名稱</th>
                <th>操作</th>
                <th>時間</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="log : ${logs}">
                <td th:text="${log.memberId}"></td>
                <td th:text="${log.memberAccount}"></td>
                <td th:text="${log.productId}"></td>
                <td th:text="${log.productName}"></td>
                <td th:text="${log.action}"></td>
                <td th:text="${#temporals.format(log.timestamp, 'yyyy年MM月dd日 HH:mm:ss')}"></td>
            </tr>
        </tbody>
    </table>
        </div>
    </main>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <!-- Bootstrap 5.3.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
    $('#myTable').DataTable({
            "paging": true,
            "ordering": true,
            "info": true,
            "language": {
                "info": "顯示 _START_ 至 _END_ 筆，共 _TOTAL_ 筆資料",
                "lengthMenu": "顯示 <select>"+
                    '<option value="10">10</option>'+
                    '<option value="20">20</option>'+
                    '<option value="50">50</option>'+
                    '<option value="100">100</option>'+
                    '<option value="-1">所有</option>'+
                    '</select> 筆資料',
                "search": "搜尋:"
            },
            "columnDefs": [
                { "className": "text-left", "targets": "_all" }
            ]
        });
       </script>
</body>
</html>
