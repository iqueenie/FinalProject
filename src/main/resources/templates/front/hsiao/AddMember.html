<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">

<head>
    <title>Organic - Grocery Store HTML Website Template</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="author" content="">
    <meta name="keywords" content="">
    <meta name="description" content="">

    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/Swiper/9.4.1/swiper-bundle.min.css">
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0-alpha3/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/vendor.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Open+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        .full-height {
            height: 100vh;
        }
    </style>
</head>

<body>

    <div th:replace="~{front/layout/navbar}"></div>

    <section class="jarallax py-5">
        <img th:src="@{/img/all/banner.png}" class="jarallax-img">
        <div class="hero-content py-0 py-md-5">
            <div class="container-lg d-flex flex-column d-md-block align-items-center">
                <nav class="breadcrumb">
                    <a class="breadcrumb-item nav-link" th:href="@{/public/front}">首頁</a>
                    <span class="breadcrumb-item active" aria-current="page">註冊</span>
                </nav>
                <h1>歡迎註冊</h1>
            </div>
        </div>
    </section>

    <section class="full-height d-flex justify-content-center align-items-center">
        <div class="container-sm">
            <div class="row justify-content-center">
                <div class="col-lg-6 p-5 bg-white border shadow-sm">
                    
                    <h5 class="text-uppercase mb-5 mt-4">EZBUY會員註冊</h5>
                    <form th:action="@{/private/insertMembers}" method="post" class="mt-5 bg-secondary-subtle mw576px rounded-4" enctype="multipart/form-data">
                        <div class="row g-5 m-5">

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="memberName" name="memberName" placeholder="Name">
                                    <label for="memberName">您的名字</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="file" class="form-control pt2rem" id="memberPhotoFile" name="memberPhotoFile" placeholder="Upload file">
                                    <label for="memberPhoto">您的照片</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="memberAccount" name="memberAccount" placeholder="Account">
                                    <label for="memberAccount">您的帳號</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="password" class="form-control" id="memberPassword" name="memberPassword" placeholder="Password">
                                    <label for="memberPassword">您的密碼</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="date" class="form-control" id="memberBirthDate" name="memberBirthDate" placeholder="Birth Date">
                                    <label for="memberBirthDate">您的生日</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="memberAddress" name="memberAddress" placeholder="Address">
                                    <label for="memberAddress">家裡住址</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="email" class="form-control" id="memberEmail" name="memberEmail" placeholder="name@example.com">
                                    <label for="memberEmail">您的信箱</label>
                                </div>
                            </div>

                           
                            <div class="col-12 mb-3">
                                <button type="submit" name="submit" class="btn btn-primary text-uppercase w-100" >送出
                                </button>

                            </div>

                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{front/layout/footer}"></div>

    <script th:src="@{/js/jquery-1.11.0.min.js}"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/Swiper/9.4.1/swiper-bundle.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0-alpha3/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>
    <script th:src="@{/js/plugins.js}"></script>
    <script th:src="@{/js/script.js}"></script>
</body>

</html>
