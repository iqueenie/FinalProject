<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        html, body {
            height: 100vh;
            min-height: 100vh;
            background: linear-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.3)), url('/images/background.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .product-image img {
            transition: transform 0.3s ease;
        }
        .product-item:hover .product-image img {
            transform: scale(1.05);
        }
        .fixed-pagination {
		    position: fixed;
		    bottom: -15px;
		    width: 100%;
		}
    </style>
    <title>12欄</title>
</head>

<body>
    <!-- 導航欄 -->
	    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
	        <div class="container">
	            <a class="navbar-brand" th:href="@{/search}">Shop Name</a>
	            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
	                <span class="navbar-toggler-icon"></span>
	            </button>
	            <div class="collapse navbar-collapse" id="navbarResponsive">
	                <ul class="navbar-nav ms-auto">
	                    <li class="nav-item active">
	                        <a class="nav-link" href="#">Home</a>
	                    </li>
	                    <li class="nav-item">
	                        <a class="nav-link" href="#">About</a>
	                    </li>
	                    <li class="nav-item">
	                        <a class="nav-link" href="#">Services</a>
	                    </li>
	                    <li class="nav-item">
	                        <a class="nav-link" href="#">Contact</a>
	                    </li>
	                </ul>
	            </div>
	        </div>
	    </nav>

    <!-- 搜索框 -->
		<div class="container mt-5">
		    <form th:action="@{/search}" method="get">
		        <div class="input-group">
		            <input type="text" class="form-control" name="term" placeholder="輸入關鍵字搜尋" th:value="${searchTerm}">
		            <button type="submit" class="btn btn-danger ml-2">搜尋</button>
		        </div>
		    </form>
		</div>
    <!-- 商品展示 -->

		<div class="container mt-4">
		    <div class="row row-cols-1 row-cols-md-3 g-4">
		        <th:block th:each="product : ${page.content}">
		            <div class="col">
		                <div class="product-item">
		                    <div class="product-image" style="height: 200px;">
		                        <img th:src="@{/ProductPhoto(productId=${product.productId})}" class="img-fluid rounded" th:alt="${product.productName}" width="200px">
		                    </div>
		                    <div class="product-info mt-3">
		                        <h5 class="product-name mb-1" th:text="${product.productName}"></h5>
								<div class="product-price text-danger fw-bold fs-4" th:text=" '$' + ${product.productPrice}"></div>
                                <button class="btn btn-primary addToCartBtn"
                                    th:attr="data-productId=${product.productId}, data-productName=${product.productName}" onclick="addToCart(this)">加入購物車</button>
		                    </div>
		                </div>
		            </div>
		        </th:block>
		    </div>

         	<div class="pt-2"> 總共有 <span th:text="${page.totalElements}" class="text-danger fw-bold fs-5"></span> 筆商品</div>
            
            
        <ul class="pagination pt-2 fixed-pagination" th:if="${ page.totalPages != 0 }">

        <!-- 第一頁 -->
        <th:block th:switch="${page.number != 0}">
         <li th:case="${true}" class="page-item">
             <a class="page-link" th:href="@{/ShowAllProducts(p=${1})}">＜</a>
         </li>
          <li th:case="${false}" class="page-item disabled">
             <a class="page-link" >＜</a>
         </li>
        </th:block>
        
        <!-- 上一頁 -->
        <th:block th:switch="${page.number != 0}">
         <li th:case="${true}" class="page-item">
             <a class="page-link" th:href="@{/ShowAllProducts(p=${page.number})}">上一頁</a>
         </li>
          <li th:case="${false}" class="page-item disabled">
             <a class="page-link" >上一頁</a>
         </li>
        </th:block>
        
        <!-- 頁碼 -->
        <th:block th:each="pageNumber : ${#numbers.sequence(1,page.totalPages)}">
          <th:block th:switch="${page.number + 1 == pageNumber}">
           <li th:case="${false}" class="page-item">
             <a class="page-link" th:href="@{/ShowAllProducts(p=${pageNumber})}" th:text="${pageNumber}"></a>
           </li>
           <li th:case="${true}" class="page-item active">
             <span class="page-link" th:text="${pageNumber}"></span>
           </li>
           </th:block>
        </th:block>
        
        
        <!-- 下一頁 -->
        <th:block th:switch="${page.number + 1 == page.totalPages}">
	         <li th:case="${false}" class="page-item">
	             <a class="page-link" th:href="@{/ShowAllProducts(p=${page.number + 2})}">下一頁</a>
	         </li>
	         <li th:case="${true}" class="page-item disabled">
	             <a class="page-link">下一頁</a>
	         </li>
        </th:block>
        
        <!-- 最末頁 -->
        <th:block th:switch="${page.number + 1 == page.totalPages}">
	         <li th:case="${false}" class="page-item">
	             <a class="page-link" th:href="@{/ShowAllProducts(p=${page.totalPages})}">＞</a>
	         </li>
	         <li th:case="${true}" class="page-item disabled">
	             <a class="page-link">＞</a>
	         </li>
        </th:block>
        	
       </ul>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

   
     
       <script th:inline="javascript">
    function addToCart(button) {
        var productId = button.getAttribute('data-productId');
        var productName = button.getAttribute('data-productName');

        Swal.fire({
            title: '確定加入購物車?',
            html: `您確定要將 <span class="text-light bg-danger">${productName}</span> 加入購物車嗎?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '是的',
            cancelButtonText: '取消'
        }).then((result) => {
            if (result.isConfirmed) {
                var formData = {
                    productId: productId
                };

                $.ajax({
                    type: 'POST',
                    url: '/FinalProject/addToCart',
                    data: formData,
                    success: function(response) {
                        Swal.fire({
                            title: '成功加入購物車',
                            icon: 'success'
                        });
                    },
                    error: function(err) {
                        Swal.fire({
                            title: '加入購物車失敗',
                            icon: 'error'
                        });
                    }
                });
            }
        });
    }
</script>


</body>

</html>
