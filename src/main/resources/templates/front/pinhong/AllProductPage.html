<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        html, body {
            height: 100vh;
            min-height: 100vh;
            background: linear-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.3)), url('/images/background.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .product-image img {
            transition: transform 0.3s ease;
        }
        .product-item:hover .product-image img {
            transform: scale(1.05);
        }
    </style>
    <title>12欄</title>
</head>

<body>
    <!-- 導航欄 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Shop Name</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item active">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 搜索框 -->
	<div class="container mt-5">
	    <form th:action="@{/search}" method="get">
	        <div class="input-group">
	            <input type="text" class="form-control" name="term" placeholder="輸入搜尋關鍵字">
	            <button type="submit" class="btn btn-danger ml-2">搜尋</button>
	        </div>
	    </form>
	</div>
    <!-- 商品展示 -->
    <div class="container mt-5">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <th:block th:each="product : ${products}">
                <div class="col">
                    <div class="product-item">
                        <div class="product-image">
                            <img th:src="@{/ProductPhoto(productId=${product.productId})}" class="img-fluid" th:alt="${product.productName}" width="200px" >
                        </div>
                        <div class="product-info">
                            <div class="product-name mt-1" th:text="${product.productName}">商品名稱</div>
                            <div class="product-price" th:text="${product.productPrice}">價格</div>
							<button class="btn btn-primary" th:attr="data-product-name=${product.productName}" onclick="addToCart(this)">加入購物車</button>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
			function addToCart(button) {
			    var productName = button.getAttribute('data-product-name');
			    Swal.fire({
			        title: '確定加入購物車?',
			        html: `您確定要將 <span class="text-light bg-danger">${productName}</span> 加入購物車嗎?`,
			        icon: 'warning',
			        showCancelButton: true,
			        confirmButtonText: '是的',
			        cancelButtonText: '取消'
			    }).then((result) => {
			        if (result.isConfirmed) {
			            Swal.fire({
			                title: '已加入!',
			                html: `<span class="text-light bg-success">${productName}</span> 已成功加入購物車。`,
			                icon: 'success'
			            });
			        }
			    });
			}
    </script>
</body>

</html>
