<script>
document.addEventListener('DOMContentLoaded', function() {
    const productGrid = document.querySelector('.product-grid');
    const pagination = document.querySelector('.pagination');
    const sortSelect = document.getElementById('input-sort');
    const searchForm = document.querySelector('form[role="search"]');

    // 第一次進來時跳到第一頁
    loadProducts(1);

    // 頁碼的點擊事件
    pagination.addEventListener('click', function(e) {
        if (e.target.classList.contains('page-link')) {
            e.preventDefault();
            const page = e.target.getAttribute('data-page');
            if (page) {
                loadProducts(parseInt(page));
            }
        }
    });
	
	// 選擇排序，自動重新loading第一頁的產品數據
    sortSelect.addEventListener('change', function() {
        loadProducts(1);
    });
	
	// 搜尋時，自動重新loading第一頁的產品數據
    searchForm.addEventListener('submit', function(e) {
        e.preventDefault();
        loadProducts(1);
    });
	
	// 每次載入時呼叫所有產品的方法, (page)則是第幾頁
    function loadProducts(page) {
        const searchTerm = document.querySelector('input[name="searchTerm"]').value;
        const sortField = sortSelect.value === 'default' ? 'productId' : sortSelect.value;
        const sortDir = sortSelect.value === 'productId' ? 'desc' : 'asc';
        const productType = document.querySelector('.product-categories .nav-link.active')?.textContent || '';

        axios.get('/FinalProject/public/api/products', {
            params: {
                p: page,
                searchTerm: searchTerm,
                sortField: sortField,
                sortDir: sortDir,
                productType: productType
            }
        })
        .then(response => {
            const products = response.data.content;
            productGrid.innerHTML = '';
            
             axios.get('/FinalProject/productRatings/api')
                .then(ratingsResponse => {
                    const { averageRatings, reviewCounts } = ratingsResponse.data;

             products.forEach(product => {
                        const productRating = averageRatings[product.productId] || 0;
                        const reviewCount = reviewCounts[product.productId] || 0;

                        const productElement = `
                            <div class="col">
                                <div class="product-item">
                                    <figure>
                                        <a href="http://localhost:8080/FinalProject/public/Products/${product.productId}" title="${product.productName}">
                                            <img src="/FinalProject/ProductPhoto?productId=${product.productId}" alt="${product.productName}" class="tab-image" style="width:200px; height:200px">
                                        </a>
                                    </figure>
                                    <div class="d-flex flex-column text-center">
                                        <h3 class="fs-6 fw-normal">${product.productName}</h3>
                                        <div>
                                            <span class="rating">
                                                ${generateStars(productRating)}
                                            </span>
                                            <span>${productRating}★(${reviewCount})</span>
                                        </div>
                                        <div class="d-flex justify-content-center align-items-center gap-2">
                                            <del>${product.productPrice}</del>
                                            <span class="text-dark fw-semibold">$${Math.round(product.productPrice * 0.8)}</span>
                                            <span class="badge border border-dark-subtle rounded-0 fw-normal px-1 fs-7 lh-1 text-body-tertiary">20% OFF</span>
                                        </div>
                                        <div class="button-area p-3 pt-0">
                                            <div class="row g-1 mt-2">
                                                <div class="col-3">
                                                    <input type="number" name="quantity" class="form-control border-dark-subtle input-number quantity" value="1">
                                                </div>
                                                 <div class="col-7"><a href="#" class="btn btn-primary rounded-1 p-2 fs-7 btn-cart"
                                                         data-productId="${product.productId}" data-productName="${product.productName}">
                                        <svg width="18" height="18"><use xlink:href="#cart"></use></svg> 加入購物車
                                                </a></div>
                                                <div class="col-2">
                                                    <a href="#" class="btn btn-outline-dark rounded-1 p-2 fs-6">
                                                        <svg width="18" height="18">
                                                            <use xlink:href="#heart"></use>
                                                        </svg>
                                                    </a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                        productGrid.insertAdjacentHTML('beforeend', productElement);
                    });

                    // 更新分页
                    updatePagination(response.data);
                    bindCartButtonClick();
                })
                .catch(error => {
                    console.error('Error fetching product ratings:', error);
                });
        })
        .catch(error => {
            console.error('Error fetching products:', error);
        });
    }

    function generateStars(rating) {
        let fullStars = Math.floor(rating);
 		const halfStars = rating % 1 > 0 ? 1 : 0;
        const emptyStars = 5 - fullStars - halfStars;
        let stars = '';

        for (let i = 0; i < fullStars; i++) {
            stars += '<svg width="24" height="24" class="text-warning"><use xlink:href="#star-full"></use></svg>';
        }
        for (let i = 0; i < halfStars; i++) {
            stars += '<svg width="24" height="24" class="text-warning"><use xlink:href="#star-half"></use></svg>';
        }
        for (let i = 0; i < emptyStars; i++) {
            stars += '<svg width="24" height="24" class="text-warning"><use xlink:href="#star-empty"></use></svg>';
        }

        return stars;
    }

    function updatePagination(data) {
        pagination.innerHTML = '';
		const currentPage = data.number + 1;
		const totalPages = data.totalPages;
		
        if (data.totalPages > 1) {
        
        // 第一頁
        const firstPageItem = `
            <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" data-page="1">＜</a>
            </li>
        `; 
        pagination.insertAdjacentHTML('beforeend', firstPageItem);
        
        // 頁碼
            for (let i = 1; i <= data.totalPages; i++) {
                const pageItem = `
                    <li class="page-item ${i === data.number + 1 ? 'active' : ''}">
                        <a class="page-link" href="#" data-page="${i}">${i}</a>
                    </li>
                `;
                pagination.insertAdjacentHTML('beforeend', pageItem);
            }
            
        // 最後一頁
        const lastPageItem = `
            <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" data-page="${totalPages}">＞</a>
            </li>
        `;
        pagination.insertAdjacentHTML('beforeend', lastPageItem);
        }
    }
});
  function bindCartButtonClick() {
    const cartButtons = document.querySelectorAll('.btn-cart');
    cartButtons.forEach(button => {
      button.addEventListener('click', function (e) {
        e.preventDefault();
        addToCart(this);
      });
    });
  }


  function addToCart(button) {
    var productId = button.getAttribute('data-productId');
    var productName = button.getAttribute('data-productName');
    var quantity = parseInt(button.closest('.product-item').querySelector('.quantity').value);

    Swal.fire({
      title: '確定加入購物車?',
      html: `您確定要將 <span class="text-light bg-danger">${productName}</span> 加入購物車嗎?`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '是的',
      cancelButtonText: '取消'
    }).then((result) => {
      if (result.isConfirmed) {
        var params = new URLSearchParams();
        params.append('productId', productId);
        params.append('quantity', quantity);

        axios.post(`/FinalProject/public/addToCart?${params.toString()}`)
          .then(res => {
            Swal.fire({
              title: '成功加入購物車',
              icon: 'success'
            });
          })
          .catch(err => {
            console.error('加入購物車失敗:', err);
            Swal.fire({
              title: '加入購物車失敗',
              text: err.message || '加入購物車時發生錯誤',
              icon: 'error'
            });
          });
      }
    });
  }

</script>
