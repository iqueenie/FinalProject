<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>團購商品到貨通知</title>
</head>

<body>
    <h1>主旨：【EZBUY】團購商品到貨通知</h1>

    <h2>親愛的 [客戶姓名]，您好！</h2>

    <p>感謝您向EZBUY購買商品，您所訂購的團購商品已經到貨。</p>

    <h3>訂單詳情：</h3>
    <ul>
        <li>訂單編號： [訂單編號]</li>
        <li>商品名稱： [商品名稱]</li>
        <li>訂購數量： [訂購數量]</li>
        <li>團購價格： [團購價格]</li>
    </ul>

    <h3>取貨方式：門市自取</h3>
    <ul>
        <li>取貨地點： [門市地址]</li>
        <li>營業時間： [營業時間]</li>
        <li>取貨日期： [取貨開始日期] 至 [取貨結束日期]</li>
    </ul>

    <p>再次感謝您的支持與信任，祝您有美好的一天！</p>

    <p>此致，<br>EZBUY</p>
</body>

</html>
